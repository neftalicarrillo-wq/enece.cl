<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 62" fill="none">
  <!-- Fondo -->
  <rect width="62" height="62" rx="12" fill="#0a0b09"/>

  <!-- N: trazos -->
  <line x1="14" y1="1" x2="14" y2="61" stroke="#FF6B00" stroke-width="7" stroke-linecap="round"/>
  <line x1="48" y1="1" x2="48" y2="61" stroke="#FF6B00" stroke-width="7" stroke-linecap="round"/>
  <line x1="14" y1="1" x2="48" y2="61" stroke="#FF6B00" stroke-width="7" stroke-linecap="round"/>

  <!-- Órbitas centradas en (31,31) -->
  <circle cx="31" cy="31" r="30" stroke="#FF6B00" stroke-width="1.8" fill="none" opacity="0.55"/>
  <circle cx="31" cy="31" r="18" stroke="#FF6B00" stroke-width="1.2" fill="none" opacity="0.35" stroke-dasharray="4 5"/>

  <!-- Líneas desde nodo central -->
  <line x1="31" y1="31" x2="31" y2="1"  stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="31" y1="31" x2="31" y2="61" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="31" y1="31" x2="48" y2="31" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Nodo central hueco -->
  <circle cx="31" cy="31" r="7" fill="#0a0b09"/>
  <circle cx="31" cy="31" r="7" stroke="#FF6B00" stroke-width="2.5" fill="none"/>

  <!-- Nodos satélite -->
  <circle cx="31" cy="1"  r="5.5" fill="#FF6B00"/>
  <circle cx="31" cy="61" r="5.5" fill="#FF6B00"/>
  <circle cx="48" cy="31" r="5.5" fill="#FF6B00"/>
</svg>
